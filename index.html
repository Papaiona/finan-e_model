<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>Энергоцентр · Project Finance (поэтапный пуск)</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.2.1/dist/chartjs-plugin-annotation.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --text: #0a1929;
      --text-secondary: #2a3a4e;
      --accent: #00bfa6;
      --accent-dark: #009f8c;
      --accent-light: #ccf5f0;
      --border: #d0dbe4;
      --input-bg: #f8fafc;
      --shadow-sm: 0 1px 3px rgba(10, 44, 78, 0.08);
      --shadow-md: 0 4px 12px rgba(10, 44, 78, 0.1);
      --shadow-lg: 0 10px 25px rgba(10, 44, 78, 0.12);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --primary-btn: linear-gradient(135deg, #0a2c4e 0%, #143c64 100%);
      --primary-btn-text: white;
      --success-gradient: linear-gradient(135deg, #00bfa6 0%, #009f8c 100%);
      --error: #e74c3c;
    }

    .dark-theme {
      --bg: #0a1929;
      --card-bg: #112b42;
      --text: #e0eaf5;
      --text-secondary: #9aaec9;
      --accent: #00bfa6;
      --accent-light: #1a3b3a;
      --border: #2a4365;
      --input-bg: #14334d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: var(--text);
      line-height: 1.5;
    }

    .calculator-card {
      max-width: 1600px;
      width: 100%;
      background: var(--card-bg);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: 32px;
      border: 1px solid var(--border);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 8px;
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      background: var(--input-bg);
      padding: 4px;
      border-radius: var(--radius-md);
      width: fit-content;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 8px 20px;
      border-radius: var(--radius-sm);
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .tab-btn.active {
      background: white;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      font-weight: 600;
    }

    .dark-theme .tab-btn.active {
      background: #112b42;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 24px;
    }

    @media (max-width:1024px) {
      .grid-container {
        grid-template-columns: 1fr;
      }
    }

    .input-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-section {
      background: #f9fafb;
      border-radius: var(--radius-lg);
      padding: 16px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
      transition: background 0.2s;
    }

    .dark-theme .panel-section {
      background: #1e293b;
    }

    .section-title {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .collapsible .section-content {
      display: block;
    }

    .collapsible.collapsed .section-content {
      display: none;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .param-label {
      width: 200px;
      min-width: 200px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
    }

    input[type="number"],
    input[type="text"],
    select {
      flex: 1 1 auto;
      min-width: 120px;
      max-width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
    }

    .dark-theme input,
    .dark-theme select {
      background: #1e293b;
    }

    .slider-block {
      margin-bottom: 16px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .slider-value {
      background: var(--accent);
      color: white;
      padding: 2px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: var(--border);
      border-radius: 10px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid white;
      cursor: pointer;
    }

    .btn {
      padding: 10px 18px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      border: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--primary-btn);
      color: var(--primary-btn-text);
    }

    .btn-success {
      background: var(--success-gradient);
      color: white;
    }

    .btn-secondary {
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn:hover {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }

    canvas {
      max-height: 220px;
      min-height: 180px;
      width: 100% !important;
    }

    .chart-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 12px;
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .dark-theme .chart-card {
      background: #2d3748;
    }

    .chart-title {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 10px;
    }

    .chart-description {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 8px;
      font-style: italic;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .metric-card {
      background: var(--input-bg);
      border-radius: var(--radius-md);
      padding: 12px;
      border: 1px solid var(--border);
    }

    .debt-schedule-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    .debt-schedule-table th,
    .debt-schedule-table td {
      border: 1px solid var(--border);
      padding: 6px;
      text-align: center;
    }

    .error-message {
      background: #fee2e2;
      color: #b91c1c;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: none;
    }

    .stage-row,
    .capex-year-row,
    .lifecycle-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .sensitivity-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 0.8rem;
    }

    .sensitivity-table th,
    .sensitivity-table td {
      border: 1px solid var(--border);
      padding: 6px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="methodologyModal"
    style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center;">
    <div
      style="background: var(--card-bg); max-width: 90%; max-height: 90%; width: 800px; border-radius: var(--radius-lg); overflow: auto; padding: 20px; position: relative;">
      <button id="closeMethodologyBtn"
        style="position: sticky; top: 0; float: right; background: #e74c3c; color: white; border: none; border-radius: 20px; padding: 5px 12px; cursor: pointer;">✕
        Закрыть</button>
      <div id="methodologyContent"
        style="white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; line-height: 1.4; margin-top: 20px;">
      </div>
    </div>
  </div>

  <div class="calculator-card" id="mainCard">
    <div class="header">
      <h1><i class="fas fa-bolt" style="color:var(--accent);"></i> Энергоцентр · Project Finance <span
          style="font-size:0.8rem;">(поэтапный пуск)</span></h1>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn" id="themeToggle"><i class="fas fa-moon"></i></button>
        <button class="btn btn-primary" id="downloadMethodologyBtn"><i class="fas fa-calculator"></i> Методика</button>
        <button class="btn btn-success" id="generateReportBtn"><i class="fas fa-file-alt"></i> Отчёт</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="main">Основное</button>
      <button class="tab-btn" data-tab="scenarios">Сценарии</button>
      <button class="tab-btn" data-tab="sensitivity">Чувствительность</button>
      <button class="tab-btn" data-tab="montecarlo">Монте-Карло</button>
    </div>
    <div id="globalError" class="error-message"></div>
    <div class="tab-content active" id="main">
      <div class="grid-container">
        <div class="input-panel" id="inputPanel"></div>
        <div class="charts-panel" id="chartsPanel"></div>
      </div>
    </div>
    <div class="tab-content" id="scenarios">
      <div style="display:flex; gap:12px; flex-wrap:wrap;">
        <select id="scenarioSelect"></select>
        <button class="btn btn-primary" id="saveScenarioBtn">💾 Сохранить</button>
        <button class="btn btn-secondary" id="loadScenarioBtn">📂 Загрузить</button>
        <button class="btn btn-secondary" id="deleteScenarioBtn">🗑️ Удалить</button>
      </div>
    </div>
    <div class="tab-content" id="sensitivity">
      <div>
        <h4>Анализ чувствительности</h4>
        <div id="sensitivityParams" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
        <div style="margin-top:8px;">
          <label>Целевой: <select id="sensitivityTarget">
              <option value="project_npv">NPV проекта</option>
              <option value="equity_npv">NPV Equity</option>
              <option value="project_irr">IRR проекта</option>
              <option value="equity_irr">IRR Equity</option>
            </select></label>
          <label>Размах: <select id="sensitivityRange">
              <option value="20">±20%</option>
              <option value="10">±10%</option>
            </select></label>
          <button class="btn btn-primary" id="runSensitivity">Рассчитать</button>
        </div>
        <div class="chart-card"><canvas id="tornadoChart"></canvas>
          <div class="chart-description" id="tornadoDesc"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Таблица чувствительности</div>
          <div id="sensitivityTableContainer"></div>
        </div>
      </div>
    </div>
    <div class="tab-content" id="montecarlo">
      <div style="display:flex; gap:14px; align-items:center; flex-wrap:wrap;">
        <label>Итераций: <input type="number" id="mcIterations" value="500"></label>
        <label>Отклонение ±%: <input type="number" id="mcStdDev" value="15"></label>
        <button class="btn btn-primary" id="runMonteCarlo">🎲 Запустить</button>
        <span id="mcProgress"></span>
      </div>
      <div class="chart-card"><canvas id="mcHistogram"></canvas>
        <div class="chart-description">Распределение NPV проекта при случайном изменении ключевых параметров.</div>
      </div>
      <div id="mcStats" style="margin-top:12px; padding:12px; background:var(--input-bg); border-radius:8px;"></div>
    </div>
  </div>

  <script>
    // ---------- КЛИЕНТСКИЕ КОНСТАНТЫ (только для отображения) ----------
    const CLIENT_CONFIG = {
      transferTariff04: 0.329,
      transferTariff10: 0.265
    };

    const fmt = v => isNaN(v) || v === Infinity || v === -Infinity ? '—' : new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 0 }).format(v);
    const fmtPercent = v => (v * 100).toFixed(1) + '%';

    let currentModel = null;
    const charts = {};

    function destroyAllCharts() {
      Object.values(charts).forEach(c => c?.destroy());
      for (let k in charts) delete charts[k];
    }

    function updateCharts(model) {
      if (!model) return;
      destroyAllCharts();
      const container = document.getElementById('chartsPanel');
      container.innerHTML = `
      <div class="chart-card"><div class="chart-title">Выручка / OPEX (1-й год, без НДС)</div><canvas id="barChart"></canvas><div class="chart-description">Сравнение выручки от продажи электроэнергии, тепла и общих операционных затрат за первый год проекта.</div></div>
      <div class="chart-card"><div class="chart-title">Состав OPEX (без НДС)</div><canvas id="pieChart"></canvas><div class="chart-description">Структура операционных расходов: топливо, ТО, ФОТ, экология, прочие, масло, утилизация, расходники.</div></div>
      <div class="chart-card"><div class="chart-title">Себестоимость vs тариф (без НДС)</div><canvas id="costPerKwhChart"></canvas><div class="chart-description">Средневзвешенная себестоимость 1 кВт·ч (суммарный OPEX / суммарный полезный отпуск) и тариф покупки из сети (с передачей).</div></div>
      <div class="chart-card"><div class="chart-title">FCFF и FCFE</div><canvas id="cfChart"></canvas><div class="chart-description">Свободный денежный поток фирмы (FCFF) и акционерам (FCFE) по годам.</div></div>
      <div class="chart-card"><div class="chart-title">Кумулятивные потоки</div><canvas id="cumCfChart"></canvas><div class="chart-description">Накопленный FCFF и FCFE нарастающим итогом.</div></div>
      <div class="chart-card"><div class="chart-title">Ключевые метрики</div><div id="metricsPanel"></div></div>
      <div class="chart-card" id="dscrCard"><div class="chart-title">DSCR (годовой)</div><canvas id="dscrChart"></canvas><div class="chart-description">Коэффициент покрытия долга (DSCR) = CFADS / (проценты + основной долг).</div></div>
      <div class="chart-card"><div class="chart-title">График долга и CFADS для банка</div>
        <table id="debtScheduleTable" class="debt-schedule-table"><tr>
        <div style="margin-top:10px;"><strong>CFADS (для обслуживания долга):</strong></div>
        <div id="cfadsBankTable" style="overflow-x:auto;"></div>
        <div class="chart-description">Денежный поток, доступный для обслуживания долга, и график погашения кредита.</div>
      </div>
    `;
      const y0 = model.yearly_operating[0];
      if (y0) {
        new Chart(document.getElementById('barChart'), { type: 'bar', data: { labels: ['Выручка сеть', 'Выручка тепло', 'OPEX'], datasets: [{ data: [y0.revenueGrid_excl_vat, y0.revenueHeat_excl_vat, y0.opex_excl_vat], backgroundColor: ['#94a3b8', '#f59e0b', '#00bfa6'] }] } });
        new Chart(document.getElementById('pieChart'), { type: 'doughnut', data: { labels: ['Топливо', 'ТО', 'ФОТ', 'Экология', 'Прочие', 'Масло', 'Утилизация', 'Расходники'], datasets: [{ data: [y0.fuelCost, y0.maintCost, y0.fotCost, y0.ecoCost, y0.otherOpex, y0.totalOilCost, y0.wasteCost, y0.consumablesCost], backgroundColor: ['#00bfa6', '#94a3b8', '#1e293b', '#f59e0b', '#8b5cf6', '#ec4899', '#f97316', '#14b8a6'] }] } });
      }
      const totalOpex = model.yearly_operating.reduce((s, y) => s + y.opex_excl_vat, 0);
      const totalNetKwh = model.yearly_operating.reduce((s, y) => s + y.netKWh, 0);
      const ownCost = totalNetKwh > 0 ? totalOpex / totalNetKwh : 0;
      const gridTariff = model.params.gridPriceRubKWh + (model.params.voltageKV === 0.4 ? CLIENT_CONFIG.transferTariff04 : CLIENT_CONFIG.transferTariff10);
      new Chart(document.getElementById('costPerKwhChart'), { type: 'bar', data: { labels: ['Своя (руб/кВт·ч)', 'Сеть (руб/кВт·ч)'], datasets: [{ data: [ownCost, gridTariff], backgroundColor: ['#00bfa6', '#94a3b8'] }] } });

      const yearsLabels = model.yearly_operating.map(y => y.year);
      new Chart(document.getElementById('cfChart'), { type: 'line', data: { labels: yearsLabels, datasets: [{ label: 'FCFF (проект)', data: model.fcff, borderColor: '#00bfa6' }, { label: 'FCFE (акционерам)', data: model.equity_cf, borderColor: '#1e293b' }] } });
      let cumFcff = 0, cumFcfe = 0, cumFcffArr = [], cumFcfeArr = [];
      model.fcff.forEach(v => { cumFcff += v; cumFcffArr.push(cumFcff); });
      model.equity_cf.forEach(v => { cumFcfe += v; cumFcfeArr.push(cumFcfe); });
      new Chart(document.getElementById('cumCfChart'), { type: 'line', data: { labels: yearsLabels, datasets: [{ label: 'Кум. FCFF', data: cumFcffArr, borderColor: '#00bfa6' }, { label: 'Кум. FCFE', data: cumFcfeArr, borderColor: '#1e293b' }] } });
      const m = model.metrics;
      document.getElementById('metricsPanel').innerHTML = `<div class="metrics-grid">
      <div class="metric-card"><b>NPV проекта</b><br>${fmt(m.project_npv)}</div>
      <div class="metric-card"><b>IRR проекта</b><br>${m.project_irr ? fmtPercent(m.project_irr) : '—'}</div>
      <div class="metric-card"><b>NPV Equity</b><br>${fmt(m.equity_npv)}</div>
      <div class="metric-card"><b>IRR Equity</b><br>${m.equity_irr ? fmtPercent(m.equity_irr) : '—'}</div>
      <div class="metric-card"><b>Min DSCR</b><br>${m.min_dscr === Infinity ? '—' : m.min_dscr.toFixed(2)}</div>
      <div class="metric-card"><b>LLCR</b><br>${m.llcr ? m.llcr.toFixed(2) : '—'}</div>
      <div class="metric-card"><b>ROE</b><br>${m.roe.toFixed(1)}%</div>
      <div class="metric-card"><b>WACC</b><br>${(m.wacc * 100).toFixed(1)}%</div>
      <div class="metric-card"><b>Ke (CAPM)</b><br>${(m.ke * 100).toFixed(1)}%</div>
    </div>`;
      const dscrCard = document.getElementById('dscrCard');
      if (model.debtSchedule.length && m.dscr_values.length) {
        dscrCard.style.display = 'block';
        new Chart(document.getElementById('dscrChart'), { type: 'line', data: { labels: model.debtSchedule.map(d => d.year), datasets: [{ label: 'DSCR', data: m.dscr_values, borderColor: '#f59e0b' }] } });
      } else dscrCard.style.display = 'none';
      const debtTbl = document.getElementById('debtScheduleTable');
      if (model.debtSchedule.length) debtTbl.innerHTML = `<table><th>Год</th><th>Остаток</th><th>%</th><th>Тело</th><th>Платёж</th></tr>` + model.debtSchedule.map(s => `<tr><td>${s.year}</td><td>${fmt(s.debt)}</td><td>${fmt(s.interest)}</td><td>${fmt(s.principal)}</td><td>${fmt(s.payment)}</td></tr>`).join('');
      else debtTbl.innerHTML = '<tr><td colspan="5">Кредит не используется</td></tr>';
      const cfadsDiv = document.getElementById('cfadsBankTable');
      let cum = 0, html = '<table class="debt-schedule-table"><tr><th>Год</th><th>CFADS</th><th>Кум.</th></tr>';
      model.cfads.forEach((v, i) => { cum += v; html += `<tr><td>${i + 1}</td><td>${fmt(v)}</td><td>${fmt(cum)}</td></tr>`; });
      html += '</table>'; cfadsDiv.innerHTML = html;
    }

    function getParams() {
      const num = (id, def = 0) => { const el = document.getElementById(id); return el ? parseFloat(el.value) || def : def; };
      const int = (id, def = 0) => { const el = document.getElementById(id); return el ? parseInt(el.value) || def : def; };
      const chk = (id) => { const el = document.getElementById(id); return el ? el.checked : false; };
      let p = {
        projectYears: Math.max(5, int('projectYears', 10)), powerMW: parseFloat(document.getElementById('powerSlider')?.value || 6),
        voltageKV: parseFloat(document.querySelector('input[name="voltageClass"]:checked')?.value || 0.4),
        fuelCostRubM3: num('fuelCost', 8.5), gridPriceRubKWh: num('gridPrice', 7.55),
        operatingHours: num('operatingHours', 7800), gasConsumption: num('gasConsumption', 0.272),
        loadFactor: num('loadFactor', 1), degradationPerYear: num('degradationRate', 0.5),
        salvagePercent: num('salvagePercent', 10), maintCapexPercent: num('maintCapexPercent', 1),
        ownNeeds: { percent: chk('ownNeedsCheck') ? num('ownNeedsPct', 3) : 0 },
        startupGas: { active: chk('startupCheck'), startupsPerUnit: num('startupsNum', 10), gasPerStartup: num('startupGasVol', 100) },
        otherOpex: { active: chk('otherOpexCheck'), totalAnnual: num('otherOpexAmount', 500000), inflationType: document.getElementById('otherOpexInfl')?.value || 'none', includeCapacityPayment: chk('capacityPaymentCheck'), capacityPaymentRate: num('capacityPaymentRate', 200) },
        cogeneration: { active: chk('cogenCheck'), heatTariffRubGcal: num('heatTariff', 3000) },

        stagedCommissioning: { active: chk('stagedCheck'), preProjectCapex: num('preProjectCapex', 0), stages: [] }
      };
      if (p.stagedCommissioning.active) {
        document.querySelectorAll('.stage-row').forEach(row => {
          const year = parseInt(row.querySelector('.stage-year').value);
          const power = parseFloat(row.querySelector('.stage-power').value);
          if (!isNaN(year) && !isNaN(power) && power > 0) p.stagedCommissioning.stages.push({ year, powerMW: power });
        });
      } else {
        p.capexProfile = [];
        document.querySelectorAll('.capex-year-row').forEach(row => {
          const y = parseInt(row.querySelector('.capex-year').value);
          const pc = parseFloat(row.querySelector('.capex-percent').value);
          if (!isNaN(y) && !isNaN(pc)) p.capexProfile.push({ yearOffset: y, percent: pc });
        });
        if (p.capexProfile.length === 0) p.capexProfile.push({ yearOffset: 0, percent: 100 });
        p.lifecycle = { active: chk('lifecycleCheck'), events: [] };
        if (p.lifecycle.active) {
          document.querySelectorAll('.lifecycle-row').forEach(row => {
            const y = parseInt(row.querySelector('.lifecycle-year').value);
            const ap = parseFloat(row.querySelector('.lifecycle-asset').value);
            const cp = parseFloat(row.querySelector('.lifecycle-cost').value);
            if (!isNaN(y) && !isNaN(ap) && !isNaN(cp)) p.lifecycle.events.push({ year: y, assetCapexPercent: ap, replacementCostPercent: cp });
          });
        }
      }
      return p;
    }

    async function refresh() {
      showError('');
      const params = getParams();
      try {
        const response = await fetch('/.netlify/functions/calculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(params)
        });
        if (!response.ok) {
          const errData = await response.json();
          throw new Error(errData.error || 'Server error');
        }
        const modelData = await response.json();
        // Добавляем params в модель для корректной работы графиков (тариф сети)
        modelData.params = params;
        currentModel = modelData;
        updateCharts(currentModel);
      } catch (err) {
        showError(err.message);
        console.error(err);
      }
    }

    function showError(msg) {
      const e = document.getElementById('globalError');
      e.textContent = msg ? '⚠️ ' + msg : '';

    // Анализ чувствительности (локальный, так как он многократно вызывает модель)
    const sensParamsMap = {
      'fuelCostRubM3': 'Цена газа', 'gridPriceRubKWh': 'Тариф сети',
      'capex_total': 'Удельный CAPEX', 'powerMW': 'Мощность',
      'operatingHours': 'Часы работы', 'gasConsumption': 'Уд. расход газа', 'degradationPerYear': 'Деградация'
    };
    const sensKeys = Object.keys(sensParamsMap);
    document.getElementById('sensitivityParams').innerHTML = sensKeys.map(k => `<label><input type="checkbox" value="${k}" checked> ${sensParamsMap[k]}</label>`).join('');

    document.getElementById('runSensitivity').addEventListener('click', async () => {
      const baseParams = getParams();
      const range = parseFloat(document.getElementById('sensitivityRange').value) / 100;
      const target = document.getElementById('sensitivityTarget').value;
      const checks = [...document.querySelectorAll('#sensitivityParams input[type=checkbox]:checked')].map(cb => cb.value);
      if (!checks.length) return;

      // Получаем базовую модель с сервера
      const baseResponse = await fetch('/.netlify/functions/calculate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(baseParams)
      });
      const baseModel = await baseResponse.json();
      const getMetric = (m) => {
        if (target === 'project_npv') return m.metrics.project_npv;
        if (target === 'equity_npv') return m.metrics.equity_npv;
        if (target === 'project_irr') return m.metrics.project_irr || 0;
        return m.metrics.equity_irr || 0;
      };
      const baseVal = getMetric(baseModel);
      const results = [];
      for (let param of checks) {
        const lowParams = JSON.parse(JSON.stringify(baseParams));
        const highParams = JSON.parse(JSON.stringify(baseParams));
        let baseValue;
        if (param === 'capex_total') {
          baseValue = (baseParams.capexEquipment + baseParams.capexDesign + baseParams.capexNetwork + baseParams.capexCommissioning + baseParams.capexInfrastructure);
          if (baseParams.voltageKV === 0.4) baseValue += 6;
        } else {
          baseValue = baseParams[param];
        }
        const lowVal = baseValue * (1 - range);
        const highVal = baseValue * (1 + range);
        if (param === 'capex_total') {
          const factorLow = lowVal / baseValue;
          const factorHigh = highVal / baseValue;
          lowParams.capexEquipment *= factorLow;
          lowParams.capexDesign *= factorLow;
          lowParams.capexNetwork *= factorLow;
          lowParams.capexCommissioning *= factorLow;
          lowParams.capexInfrastructure *= factorLow;
          highParams.capexEquipment *= factorHigh;
          highParams.capexDesign *= factorHigh;
          highParams.capexNetwork *= factorHigh;
          highParams.capexCommissioning *= factorHigh;
          highParams.capexInfrastructure *= factorHigh;
        } else {
          lowParams[param] = lowVal;
          highParams[param] = highVal;
        }
        const [lowModel, highModel] = await Promise.all([
          fetch('/.netlify/functions/calculate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(lowParams) }).then(r => r.json()),
          fetch('/.netlify/functions/calculate', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(highParams) }).then(r => r.json())
        ]);
        results.push({
          param: sensParamsMap[param],
          base: baseValue,
          lowVal, highVal,
          lowMetric: getMetric(lowModel),
          highMetric: getMetric(highModel),
          spread: Math.abs(getMetric(highModel) - getMetric(lowModel))
        });
      }
      results.sort((a, b) => b.spread - a.spread);
      if (charts.tornado) charts.tornado.destroy();
      charts.tornado = new Chart(document.getElementById('tornadoChart'), {
        type: 'bar',
        data: {
          labels: results.map(r => r.param),
          datasets: [
            { label: 'Низкое значение', data: results.map(r => r.lowMetric), backgroundColor: '#f87171' },
            { label: 'Высокое значение', data: results.map(r => r.highMetric), backgroundColor: '#00bfa6' }
          ]
        },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: true }
      });
      document.getElementById('tornadoDesc').innerHTML = `Влияние изменения параметров на ${target === 'project_npv' ? 'NPV проекта' : target === 'equity_npv' ? 'NPV Equity' : target === 'project_irr' ? 'IRR проекта' : 'IRR Equity'}. Диапазон ±${document.getElementById('sensitivityRange').value}%.`;
      const tableHtml = `<table class="sensitivity-table">
      <thead><tr><th>Параметр</th><th>Базовое значение</th><th>Низкое (-${range * 100}%)</th><th>Высокое (+${range * 100}%)</th><th>Результат при низком</th><th>Результат при высоком</th><th>Размах</th></tr></thead>
      <tbody>${results.map(r => `<tr>
        <td>${r.param}</td>
        <td>${r.base.toFixed(2)}</td>
        <td>${r.lowVal.toFixed(2)}</td>
        <td>${r.highVal.toFixed(2)}</td>
        <td>${target.includes('npv') ? fmt(r.lowMetric) : (r.lowMetric * 100).toFixed(1) + '%'}</td>
        <td>${target.includes('npv') ? fmt(r.highMetric) : (r.highMetric * 100).toFixed(1) + '%'}</td>
        <td>${target.includes('npv') ? fmt(r.highMetric - r.lowMetric) : ((r.highMetric - r.lowMetric) * 100).toFixed(1) + '%'}</td>
      </tr>`).join('')}</tbody>
     </table>`;
      document.getElementById('sensitivityTableContainer').innerHTML = tableHtml;
    });

    // Монте-Карло (локальный, так как много вызовов)
    document.getElementById('runMonteCarlo').addEventListener('click', async () => {
      const baseParams = getParams();
      const iters = parseInt(document.getElementById('mcIterations').value) || 500;
      const stdDev = parseFloat(document.getElementById('mcStdDev').value) / 100;
      const npvs = [];
      const progressSpan = document.getElementById('mcProgress');
      for (let i = 0; i < iters; i++) {
        const p = JSON.parse(JSON.stringify(baseParams));
        const vary = (base) => base * (1 + (Math.random() * 2 - 1) * stdDev);
        p.fuelCostRubM3 = vary(p.fuelCostRubM3);
        p.gridPriceRubKWh = vary(p.gridPriceRubKWh);
        const capexSum = (p.capexEquipment + p.capexDesign + p.capexNetwork + p.capexCommissioning + p.capexInfrastructure);
        const factor = vary(1);
        p.capexEquipment *= factor;
        p.capexDesign *= factor;
        p.capexNetwork *= factor;
        p.capexCommissioning *= factor;
        p.capexInfrastructure *= factor;
        p.operatingHours = Math.min(8760, Math.max(100, vary(p.operatingHours)));
        try {
          const response = await fetch('/.netlify/functions/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(p)
          });
          const model = await response.json();
          npvs.push(model.metrics.project_npv);
        } catch (e) { }
        if (i % 100 === 0) progressSpan.innerText = `${i}/${iters}`;
      }
      progressSpan.innerText = 'Готово';
      if (npvs.length === 0) { document.getElementById('mcStats').innerHTML = 'Ошибка: нет результатов'; return; }
      const mean = npvs.reduce((a, b) => a + b, 0) / npvs.length;
      const sorted = npvs.sort((a, b) => a - b);
      const p10 = sorted[Math.floor(sorted.length * 0.1)];
      const p90 = sorted[Math.floor(sorted.length * 0.9)];
      const probPos = npvs.filter(v => v > 0).length / npvs.length * 100;
      document.getElementById('mcStats').innerHTML = `Среднее NPV: ${fmt(mean)} | P10: ${fmt(p10)} | P90: ${fmt(p90)} | >0: ${probPos.toFixed(1)}%`;
      const bins = 20, min = sorted[0], max = sorted[sorted.length - 1];
      const step = (max - min) / bins;
      const hist = new Array(bins).fill(0);
      npvs.forEach(v => { const idx = Math.min(bins - 1, Math.floor((v - min) / step)); hist[idx]++; });
      if (charts.mcHist) charts.mcHist.destroy();
      charts.mcHist = new Chart(document.getElementById('mcHistogram'), {
        type: 'bar',
        data: { labels: Array.from({ length: bins }, (_, i) => (min + i * step).toFixed(0)), datasets: [{ data: hist, backgroundColor: '#00bfa6' }] }
      });
    });

            <li><strong>LLCR</strong> = ${m.llcr ? m.llcr.toFixed(2) : '—'}. ${m.llcr && m.llcr > 1 ? 'Долг обеспечен потоками на весь срок.' : 'Недостаточное покрытие.'}</li>
